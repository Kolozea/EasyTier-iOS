name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-unsigned-ipa.yml"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version
          rustc --version || true
          protoc --version || true

      - name: Install Rust target and protoc
        run: |
          set -e
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup target add aarch64-apple-ios
          if ! command -v protoc >/dev/null 2>&1; then
            brew install protobuf
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          protoc --version

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project EasyTier.xcodeproj \
            -scheme EasyTier

      - name: Build unsigned app
        run: |
          set -o pipefail
          xcodebuild \
            -project EasyTier.xcodeproj \
            -scheme EasyTier \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ASSETCATALOG_COMPILER_APPICON_NAME="" \
            build | tee build.log

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/EasyTier.app"
          test -d "$APP_PATH"
          mkdir -p build/Payload
          ditto "$APP_PATH" "build/Payload/EasyTier.app"
          cd build
          /usr/bin/zip -qry EasyTier-unsigned.ipa Payload
          shasum -a 256 EasyTier-unsigned.ipa > EasyTier-unsigned.ipa.sha256

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: EasyTier-unsigned-ipa
          path: |
            build/EasyTier-unsigned.ipa
            build/EasyTier-unsigned.ipa.sha256
            build.log
          if-no-files-found: error
          retention-days: 14
